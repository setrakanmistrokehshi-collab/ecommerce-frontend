version: '3.9'

services:
  # ── Frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: .
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    image: vitacore-frontend:latest
    container_name: vitacore-frontend
    ports:
      - '80:80'
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - vitacore-net

  # ── Backend (assumes vitacore-backend image exists) ────────────
  backend:
    image: vitacore-backend:latest
    container_name: vitacore-backend
    env_file: .env.backend
    ports:
      - '3000:3000'
    restart: unless-stopped
    networks:
      - vitacore-net

networks:
  vitacore-net:
    driver: bridge
